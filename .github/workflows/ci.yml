name: CI

on:
  push:
    branches: [master, "feat/*"]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: research-agent

      - name: Run tests
        run: |
          pip install pytest-timeout
          pytest tests/ -v --tb=short -k "not (test_e2e or test_integration or test_llm)"
        working-directory: research-agent

      - name: Check credentials
        run: |
          if grep -rPn "sk-[a-zA-Z0-9]{20,}" src/; then echo "WARNING: API key found" >&2; fi
        working-directory: research-agent

      - name: Verify docs
        run: |
          test -f specs/2026-07-09-research-agent-design.md && echo "SPEC OK"
          test -f plans/2026-07-09-research-agent-implementation.md && echo "PLAN OK"
          test -f SPEC_PROCESS.md && echo "PROCESS OK"
          test -f AGENT_LOG.md && echo "LOG OK"
          test -f REFLECTION.md && echo "REFLECTION OK"
        working-directory: research-agent

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Build frontend
        run: |
          npm install
          npx tsc --noEmit
          npx vite build
        working-directory: research-agent/frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build -f Dockerfile.backend -t pp-backend:ci .
        working-directory: research-agent
      - name: Build frontend
        run: docker build -f Dockerfile.frontend -t pp-frontend:ci .
        working-directory: research-agent