name: CI

on:
  push:
    branches: [master, "feat/*"]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: research-agent

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: cd research-agent && pip install -r requirements.txt

      - name: Run tests (skip LLM-dependent)
        run: cd research-agent && pip install pytest-timeout && pytest tests/ -v --tb=short -k "not (test_e2e or test_integration or test_llm)"

      - name: Check hardcoded credentials
        run: |
          cd research-agent
          if grep -rPn "sk-[a-zA-Z0-9]{20,}" src/; then echo "WARNING: API key pattern found" >&2; fi

      - name: Verify docs exist
        run: |
          cd research-agent
          test -f specs/2026-07-09-research-agent-design.md && echo "SPEC OK"
          test -f plans/2026-07-09-research-agent-implementation.md && echo "PLAN OK"
          test -f SPEC_PROCESS.md && echo "PROCESS OK"
          test -f AGENT_LOG.md && echo "LOG OK"
          test -f REFLECTION.md && echo "REFLECTION OK"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Build frontend
        run: |
          cd research-agent/frontend
          npm install
          npx tsc --noEmit
          npx vite build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: cd research-agent && docker build -f Dockerfile.backend -t paperpilot-backend:ci .
      - name: Build frontend image
        run: cd research-agent && docker build -f Dockerfile.frontend -t paperpilot-frontend:ci .