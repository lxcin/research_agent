name: CI

on:
  push:
    branches: [master, "feat/*", "wt-*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src/research_agent --cov-report=term

      - name: Check for hardcoded credentials
        run: |
          ! grep -rn "sk-.*\|api_key\s*=\s*['\"]\w\|password\s*=\s*['\"]\w\|secret\s*=\s*['\"]\w" src/ --include="*.py" || (echo "ERROR: Hardcoded credentials found" && exit 1)

      - name: Check no TODOs left
        run: |
          ! grep -rn "TODO\|FIXME\|HACK" src/ --include="*.py" || (echo "ERROR: TODO/FIXME found in source" && exit 1)

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t research-agent:ci .
      - name: Smoke test in Docker
        run: docker run --rm research-agent:ci research-agent --help