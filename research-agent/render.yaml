services:
  - type: web
    name: paperpilot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn research_agent.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: LLM_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false